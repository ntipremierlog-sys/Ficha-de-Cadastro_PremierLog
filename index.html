    // Pill Selector Component for a premium feel
    const PillSelector = ({ options, selected, onChange, error }) => {
      return (
        <div className="flex flex-wrap gap-2 mt-1.5">
          {options.map((opt) => {
            const isSelected = selected === opt.value;
            return (
              <button
                key={opt.value}
                type="button"
                onClick={() => onChange(opt.value)}
                className={`px-4 py-2.5 text-sm font-semibold rounded-xl border transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-premier-blue focus:ring-offset-1 ${isSelected
                    ? "bg-premier-blue text-white border-premier-blue shadow-md shadow-premier-blue/15"
                    : "bg-white text-slate-700 border-slate-200 hover:bg-slate-50 hover:border-slate-300"
                  }`}
              >
                {opt.label}
              </button>
            );
          })}
        </div>
      );

    // Helper functions for input formatting
    const formatCPF = (value) => {
      return value
        .replace(/\D/g, '')
        .replace(/(\d{3})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d{1,2})$/, '$1-$2')
        .slice(0, 14);
    };

    const formatPhone = (value) => {
      const raw = value.replace(/\D/g, '');
      if (raw.length <= 10) {
        return raw
          .replace(/(\d{2})(\d)/, '($1) $2')
          .replace(/(\d{4})(\d{1,4})$/, '$1-$2')
          .slice(0, 14);
      } else {
        return raw
          .replace(/(\d{2})(\d)/, '($1) $2')
          .replace(/(\d{5})(\d{1,4})$/, '$1-$2')
          .slice(0, 15);
      }
    };

    const formatCEP = (value) => {
      return value
        .replace(/\D/g, '')
        .replace(/(\d{5})(\d)/, '$1-$2')
        .slice(0, 9);
    };

    const formatNumeric = (value) => {
      return value.replace(/\D/g, '');
    };

    // App Component

      const [isFormSubmitted, setIsFormSubmitted] = useState(false);
      const [vtModal, setVtModal] = useState({ isOpen: false, option: '' });

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        let tokenParam = urlParams.get('token');
        
        // Fallback: check hash parameters
        if (!tokenParam && window.location.hash) {
          const hashParams = new URLSearchParams(window.location.hash.substring(1));
          tokenParam = hashParams.get('token');
        }
        
        if (!tokenParam) {
          if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            setIsValidatingToken(false);
          } else {
            setTokenError("Acesso restrito. A Ficha de Cadastro de Admissão da Premier Logistics só pode ser acessada através do link pessoal fornecido pelo RH.");
            setIsValidatingToken(false);
          }
          return;
        }

        setToken(tokenParam);

        if (APPS_SCRIPT_URL === 'COLE_A_URL_DO_APPS_SCRIPT_AQUI') {
          setIsValidatingToken(false);
          return;
        }

        fetch(`${APPS_SCRIPT_URL}?action=validateToken&token=${tokenParam}`)
          .then(res => res.json())
          .then(data => {
            if (data.valid) {
              setVaga(data.vaga || '');
              if (data.nome) {
                setFormData(prev => ({ ...prev, nomeCompleto: data.nome.toUpperCase() }));
              }
              setIsValidatingToken(false);
            } else {
              setTokenError(data.message || 'Link inválido ou expirado. Por favor, solicite um novo ao RH.');
              setIsValidatingToken(false);
            }
          })
          .catch(err => {
            console.error("Erro ao validar token:", err);
            setTokenError("Erro de conexão com o servidor de validação. Por favor, tente novamente mais tarde.");
            setIsValidatingToken(false);
          });
      }, []);

      useEffect(() => {
        const cleanCep = (formData.cep || '').replace(/\D/g, '');
        if (cleanCep.length === 8) {
          fetch(`https://viacep.com.br/ws/${cleanCep}/json/`)
            .then(res => res.json())
            .then(data => {
              if (!data.erro) {
                setFormData(prev => {
                  let newEndereco = prev.endereco;
                  if (data.logradouro) {
                    newEndereco = data.logradouro.toUpperCase();
                  }
                  
                  let newBairroCidade = prev.bairroCidade;
                  const parts = [];
                  if (data.bairro) parts.push(data.bairro);
                  if (data.localidade) {
                    let cityState = data.localidade;
                    if (data.uf) cityState += ` - ${data.uf}`;
                    parts.push(cityState);
                  }
                  if (parts.length > 0) {
                    newBairroCidade = parts.join(' / ').toUpperCase();
                  }
                  
                  return {
                    ...prev,
                    endereco: newEndereco,
                    bairroCidade: newBairroCidade
                  };

              }

        }
      }, [formData.cep]);

      const startDrawing = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#211551';

        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        ctx.lineTo(x, y);
        ctx.stroke();
        if (!hasSigned) {
          setHasSigned(true);
          setErrors(prev => {
            const next = { ...prev };
            delete next.assinaturaDesenho;
            return next;
          });
        }
      };

      const stopDrawing = () => {
        setIsDrawing(false);
      };

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        setHasSigned(false);
      };

        e.preventDefault();
        startDrawing(e);

            'assinaturaDigitada',
            'dependente1Nome',
            'dependente2Nome',
            'camisaTamanho',
            'calcaTamanho'
          ];
          if (uppercaseFields.includes(field)) {
            formattedValue = formattedValue.toUpperCase();
          } else if (field === 'email') {
            formattedValue = formattedValue.toLowerCase();
          }
        }
        setFormData(prev => ({ ...prev, [field]: formattedValue }));

        if (errors[field]) {
          setErrors(prev => {
            const next = { ...prev };
            delete next[field];
            return next;
          });
        }

            doc.line(marginX, tableStartY + 5.0, marginX + printableWidth, tableStartY + 5.0);
            for (let i = 1; i < 10; i++) {
              doc.line(marginX + i * colW, tableStartY, marginX + i * colW, tableStartY + 10.0);
            }

            y += 15.0;

            // Chosen Health Plan Option
            doc.setFont("helvetica", "bold");
            doc.setFontSize(7.0);
            doc.setTextColor(33, 21, 81);
            doc.text("OPÇÃO ASSINALADA:", marginX, y);
            y += 4.5;

            doc.setFont("helvetica", "normal");
            doc.setFontSize(7.2);
            doc.setTextColor(31, 41, 55);

            let optionText = '';
            if (formData.planoSaudeOpcao === 'a') {
              optionText = "[ X ] Não tenho interesse no plano de saúde.";
            } else if (formData.planoSaudeOpcao === 'b') {
              optionText = "[ X ] Opto pelo plano de saúde individual, e autorizo o empregador a descontar mensalmente em folha de pagamento os valores de mensalidade e coparticipação.";
            } else {
              optionText = "[ X ] Opto pelo plano de saúde com inclusão de dependente(s), e autorizo o empregador a descontar mensalmente em folha de pagamento os valores correspondentes de mensalidade e coparticipação.";
            }

            const splitOptText = doc.splitTextToSize(optionText, printableWidth);
            doc.text(splitOptText, marginX, y);
            y += splitOptText.length * 3.5 + 3.0;

            // Dependents Block in PDF
            if (formData.planoSaudeOpcao === 'c') {
              drawField("DEPENDENTE 01 (NOME)", formData.dependente1Nome || 'Não informado', marginX, 100);
              drawField("CPF DO DEPENDENTE 01", formData.dependente1Cpf || 'Não informado', marginX + 104, 82);
              y += 10.0;

              drawField("DEPENDENTE 02 (NOME)", formData.dependente2Nome || 'Não informado', marginX, 100);
              drawField("CPF DO DEPENDENTE 02", formData.dependente2Cpf || 'Não informado', marginX + 104, 82);
              y += 13.0;
            } else {
              y += 3.0;
            }
          }

          // 8. DECLARAÇÃO FINAL
          drawSectionHeader("Declaração Final");

          doc.setFont("helvetica", "normal");
          doc.setFontSize(7.2);
          doc.setTextColor(31, 41, 55);
          const declText = "Declaro que as informações acima são verdadeiras e autorizo os descontos em folha de pagamento conforme indicado nesta ficha, nos termos da legislação trabalhista vigente (CLT).";
          const splitDecl = doc.splitTextToSize(declText, printableWidth);
          doc.text(splitDecl, marginX, y);
          y += splitDecl.length * 3.5 + 15.0; // Space for signature block

          // 9. SIGNATURES AND DATING
          const formattedDate = getFormattedDateInPortuguese();

          doc.setFont("helvetica", "normal");
          doc.setFontSize(8.5);
          doc.setTextColor(31, 41, 55);
          doc.text(formattedDate, marginX + printableWidth / 2, y, { align: "center" });

          y += 15.0; // Space for signature

          if (formData.tipoAssinatura === 'texto') {
            // Render simulated typed signature using a canvas with EB Garamond font
            if (formData.assinaturaDigitada && formData.assinaturaDigitada.trim()) {
              try {
                const sigCanvas = document.createElement("canvas");
                sigCanvas.width = 480;
                sigCanvas.height = 120;
                const sigCtx = sigCanvas.getContext("2d");

                // Draw signature text on transparent background
                sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);

                // Configure cursive styling and auto-scale font size if needed
                let fontSize = 38;
                sigCtx.font = `italic bold ${fontSize}px 'EB Garamond', Garamond, Georgia, serif`;
                let textWidth = sigCtx.measureText(formData.assinaturaDigitada).width;
                while (textWidth > sigCanvas.width - 20 && fontSize > 16) {
                  fontSize -= 2;
                  sigCtx.font = `italic bold ${fontSize}px 'EB Garamond', Garamond, Georgia, serif`;
                  textWidth = sigCtx.measureText(formData.assinaturaDigitada).width;
                }

                sigCtx.fillStyle = "#211551"; // premier blue
                sigCtx.textAlign = "center";
                sigCtx.textBaseline = "middle";
                sigCtx.fillText(formData.assinaturaDigitada, sigCanvas.width / 2, sigCanvas.height / 2);

                const sigImgData = sigCanvas.toDataURL("image/png");
                const sigWidth = 50; // mm
                const sigHeight = 12.5; // mm
                const sigX = marginX + (printableWidth - sigWidth) / 2;
                doc.addImage(sigImgData, 'PNG', sigX, y - sigHeight - 0.5, sigWidth, sigHeight);
              } catch (sigErr) {
                console.error("Erro ao gerar assinatura digital no PDF:", sigErr);
              }
            }
          } else {
            // Render drawn signature from canvas if available
            if (hasSigned && canvasRef.current) {
              try {
                const signatureImg = canvasRef.current.toDataURL("image/png");
                const sigWidth = 50; // mm
                const sigHeight = 12.5; // mm
                const sigX = marginX + (printableWidth - sigWidth) / 2;
                doc.addImage(signatureImg, 'PNG', sigX, y - sigHeight - 0.5, sigWidth, sigHeight);
              } catch (sigErr) {
                console.error("Erro ao incluir assinatura desenhada no PDF:", sigErr);
              }
            }
          }

          // Line for signature
          doc.setDrawColor(71, 85, 105);
          doc.setLineWidth(0.4);
          const sigLineWidth = 90;
          const sigLineX = marginX + (printableWidth - sigLineWidth) / 2;
          doc.line(sigLineX, y, sigLineX + sigLineWidth, y);

          doc.setFont("helvetica", "bold");
          doc.setFontSize(7.5);
          doc.setTextColor(33, 21, 81);
          doc.text("ASSINATURA DO FUNCIONÁRIO", marginX + printableWidth / 2, y + 4.5, { align: "center" });

          // Salvar o PDF localmente (download)
          const cleanName = formData.nomeCompleto.trim().replace(/\s+/g, '_').slice(0, 30);
          const fileName = `Ficha_Cadastro_${cleanName}.pdf`;
          doc.save(fileName);

          // ETAPA 2: Enviar dados + PDF base64 ao Google Sheets / Drive
          if (token && APPS_SCRIPT_URL !== 'COLE_A_URL_DO_APPS_SCRIPT_AQUI') {
            // Retry automático: até 3 tentativas com delay crescente
            const MAX_RETRIES = 3;
            let serverSuccess = false;
            let lastServerError = null;

            for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
              try {
                const pdfBase64 = doc.output('datauristring');
                const submitResponse = await fetch(APPS_SCRIPT_URL, {
                  method: 'POST',
                  body: JSON.stringify({
                    action: 'submitForm',
                    token: token,
                    formData: formData,
                    pdfBase64: pdfBase64
                  })
                });
                const submitResult = await submitResponse.json();
                if (submitResult.success) {
                  serverSuccess = true;
                  break; // sucesso — sai do loop
                } else if (submitResult.error) {
                  lastServerError = submitResult.error;
                  console.warn(`Tentativa ${attempt} — erro do servidor:`, lastServerError);
                  // Erro de lógica (ex: token inválido) — não adianta fazer retry
                  break;
                }
              } catch (err) {
                lastServerError = err.message || 'Erro de rede';
                console.error(`Tentativa ${attempt} falhou:`, err);
                if (attempt < MAX_RETRIES) {
                  // Aguarda antes de tentar novamente: 2s, depois 4s
                  await new Promise(resolve => setTimeout(resolve, attempt * 2000));
                }
              }
            }

            if (!serverSuccess) {
              // Notifica o candidato sobre a falha sem impedir o download local
              const errMsg = lastServerError || 'Erro de conexão';
              console.error('Falha definitiva ao registrar no servidor:', errMsg);
              setErrors({
                global: `⚠️ O PDF foi gerado e baixado com sucesso, mas houve um problema ao registrar sua ficha no sistema (${errMsg}). Por favor, envie o arquivo PDF para o RH diretamente ou tente novamente clicando no botão de envio.`
              });
              setIsGenerating(false);
              return; // Não avança para tela de sucesso — status ainda Pendente
            }
          }

          setSuccessMessage('Ficha cadastral gerada com sucesso! O download do PDF iniciou automaticamente.');
          // Se tiver token, transiciona para a tela de sucesso
          if (token && APPS_SCRIPT_URL !== 'COLE_A_URL_DO_APPS_SCRIPT_AQUI') {
            setIsFormSubmitted(true);
          }
        } catch (err) {
          console.error('Erro na geração do PDF:', err);
          setErrors({ global: 'Ocorreu um erro ao gerar o PDF. Veja os detalhes no console do navegador.' });
        } finally {
          setIsGenerating(false);
        }
      };

      if (isValidatingToken) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
            <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 max-w-md w-full text-center space-y-6">
              <div className="flex justify-center">
                <div className="animate-spin rounded-full h-12 w-12 border-4 border-premier-blue border-t-premier-gold"></div>
              </div>
              <div>
                <h2 className="text-xl font-bold text-premier-blue font-sans">Carregando Formulário</h2>
                <p className="text-slate-400 text-sm mt-2 font-sans">Aguarde enquanto validamos suas credenciais...</p>
              </div>
            </div>
          </div>
        );
      }

      if (tokenError) {
        const isAlreadySubmitted = tokenError.includes('já foi preenchido');
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
            <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 max-w-lg w-full text-center space-y-6">

                  {isAlreadySubmitted ? (
                    <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                  ) : (
                    <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>

              </div>
              <div>
                <h2 className="text-xl md:text-2xl font-bold text-premier-blue font-sans">
                  {isAlreadySubmitted ? "Formulário Concluído!" : "Acesso Restrito"}

                <p className="text-slate-500 text-sm mt-3 leading-relaxed font-sans">{tokenError}</p>
              </div>
              {isAlreadySubmitted ? (
                <div className="p-4 bg-emerald-50 rounded-2xl border border-emerald-100 font-sans">
                  <p className="text-xs text-emerald-700 font-semibold leading-relaxed">
                    Suas informações de admissão foram recebidas com sucesso pela nossa equipe de Recursos Humanos. O processo está em andamento!
                  </p>
                </div>
              ) : (
                <p className="text-xs text-slate-400 font-sans">
                  Se você acredita que isso é um erro, por favor solicite um novo link ao RH da Premier Logistics.
                </p>
              )}
            </div>
          </div>
        );
      }

      if (isFormSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">

              <div className="flex justify-center">
                <div className="w-16 h-16 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center">
                  <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </div>
              </div>
              <div>
                <h2 className="text-xl md:text-2xl font-bold text-premier-blue font-sans">Formulário Enviado com Sucesso!</h2>
                <p className="text-slate-500 text-sm mt-3 leading-relaxed font-sans">
                  Obrigado por enviar suas informações. Os dados foram salvos no sistema interno e o Recursos Humanos já foi notificado.
                </p>
              </div>
              <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-left space-y-2 font-sans">
                <h4 className="text-xs font-bold text-premier-blue uppercase tracking-wider">Download do PDF</h4>
                <p className="text-xs text-slate-500 leading-normal">
                  O download do PDF da sua Ficha de Admissão preenchida foi iniciado automaticamente. Caso não tenha começado, utilize o botão abaixo para baixar uma cópia.
                </p>
              </div>
              <p className="text-xs text-slate-400 font-sans">
                Você já pode fechar esta aba.
              </p>
            </div>
          </div>
        );
      }

      return (
        <div className="container mx-auto px-4 mt-8 max-w-5xl">

          {/* Main header block */}
          <div className="bg-gradient-to-br from-premier-blue-dark to-premier-blue rounded-3xl p-6 md:p-8 shadow-xl shadow-premier-blue/20 text-white mb-8 border-b-4 border-premier-gold relative overflow-hidden">
            <div className="absolute right-0 top-0 w-72 h-72 bg-premier-gold opacity-10 rounded-full blur-3xl transform translate-x-20 -translate-y-20"></div>

            <div className="flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
              <div className="flex flex-col md:flex-row items-center gap-6 w-full">
                {LOGO_BASE64 && (
                  <div className="bg-white px-6 py-3 shrink-0 rounded-2xl overflow-hidden shadow-xl h-[115px] md:h-[140px] flex items-center justify-center transform hover:scale-[1.03] transition-transform duration-300">
                    <img src={LOGO_BASE64} alt="Premier Logistics Logo" className="h-full w-auto object-contain" />
                  </div>
                )}
                <div className="text-center flex-1 md:pr-24">
                  <span className="text-premier-gold uppercase font-bold text-xs tracking-widest block mb-1">
                    Premier Logistics Gestão Empresarial Ltda
                  </span>
                  <h1 className="text-2xl md:text-3xl font-sans font-extrabold tracking-tight">
                    Ficha de Cadastro de Admissão
                  </h1>
                  {vaga && (
                    <span className="inline-block mt-2 px-4 py-1 bg-premier-gold/20 text-premier-gold border border-premier-gold/30 text-xs font-semibold rounded-full font-sans">
                      Vaga: {formatVagaDisplay(vaga)}
                    </span>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Validation & Success Banners */}
          {Object.keys(errors).length > 0 && (
            <div className="bg-red-50 border-l-4 border-red-500 rounded-r-2xl p-4 mb-6 shadow-sm">
              <div className="flex">
                <div className="flex-shrink-0">
                  <svg className="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" />
                  </svg>
                </div>
                <div className="ml-3">
                  <h3 className="text-sm font-bold text-red-800">Atenção! Por favor, corrija os seguintes erros:</h3>
                  <ul className="mt-1.5 text-xs text-red-700 list-disc list-inside space-y-0.5">
                    {Object.values(errors).map((err, idx) => (
                      <li key={idx}>{err}</li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          )}

          {successMessage && (
            <div className="bg-emerald-50 border-l-4 border-emerald-500 rounded-r-2xl p-4 mb-6 shadow-sm animate-fade-in">
              <div className="flex">
                <div className="flex-shrink-0">
                  <svg className="h-5 w-5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                  </svg>
                </div>
                <div className="ml-3">
                  <h3 className="text-sm font-bold text-emerald-800">{successMessage}</h3>
                </div>
              </div>
            </div>

          {/* Form wrapper */}
          <form className="bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 p-6 md:p-10 space-y-10">

            {/* SECTION 1: DADOS PESSOAIS */}
            <div className="space-y-6">

                <h2 className="text-lg font-bold text-premier-blue">Dados Pessoais</h2>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">

                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nome Completo *</label>
                  <input
                    type="text"
                    required
                    value={formData.nomeCompleto}

                    placeholder="Insira o seu nome completo"
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nome Social (Se houver)</label>
                  <input
                    type="text"
                    value={formData.nomeSocial}
                    onChange={(e) => handleInputChange('nomeSocial', e.target.value)}
                    placeholder="Nome social registrado"
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">CEP</label>
                  <input
                    type="text"
                    value={formData.cep}
                    onChange={(e) => handleInputChange('cep', e.target.value, formatCEP)}

                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Bairro / Cidade</label>
                  <input

                    value={formData.bairroCidade}
                    onChange={(e) => handleInputChange('bairroCidade', e.target.value)}
                    placeholder="Ex: Cabula / Salvador"
                    className="w-full"
                  />
                </div>

                <div className="md:col-span-2">
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Endereço Residencial *</label>
                  <input
                    type="text"
                    value={formData.endereco}
                    onChange={(e) => handleInputChange('endereco', e.target.value)}
                    placeholder="Rua, Número, Complemento"
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">WhatsApp *</label>
                  <input
                    type="tel"
                    value={formData.whatsapp}
                    onChange={(e) => handleInputChange('whatsapp', e.target.value, formatPhone)}
                    placeholder="(00) 00000-0000"
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">E-mail *</label>
                  <input
                    type="email"

                  <input

                  <input
                    type="tel"

                    placeholder="(00) 00000-0000"
                    className="w-full"
                  />
                </div>
              </div>
            </div>

            {/* SECTION 2: DOCUMENTOS PESSOAIS */}
            <div className="space-y-6">
              <div className="flex items-center gap-3 border-b border-slate-100 pb-3">
                <div className="w-8 h-8 rounded-lg bg-premier-blue/10 flex items-center justify-center text-premier-blue font-bold text-sm">02</div>
                <h2 className="text-lg font-bold text-premier-blue">Documentos Pessoais</h2>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">RG (Registro Geral) *</label>
                  <input
                    type="text"
                    required
                    value={formData.rg}
                    onChange={(e) => handleInputChange('rg', e.target.value)}
                    placeholder="Digite o número do seu RG"
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">CPF *</label>
                  <input
                    type="text"
                    required
                    value={formData.cpf}
                    onChange={(e) => handleInputChange('cpf', e.target.value, formatCPF)}
                    placeholder="000.000.000-00"
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Título de Eleitor</label>
                  <input
                    type="text"
                    value={formData.tituloEleitor}
                    onChange={(e) => handleInputChange('tituloEleitor', e.target.value, formatNumeric)}
                    placeholder="Número do Título"
                    className="w-full"
                  />
                </div>
              </div>
            </div>

            {/* SECTION 3: ESCOLARIDADE E DEPENDENTES */}
            <div className="space-y-6">
              <div className="flex items-center gap-3 border-b border-slate-100 pb-3">
                <div className="w-8 h-8 rounded-lg bg-premier-blue/10 flex items-center justify-center text-premier-blue font-bold text-sm">03</div>
                <h2 className="text-lg font-bold text-premier-blue">Escolaridade e Dependentes</h2>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="md:col-span-3">
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Grau de Instrução *</label>
                  <PillSelector
                    options={[
                      { label: 'Ensino Fundamental Completo', value: 'Ensino Fundamental Completo' },
                      { label: 'Ensino Médio Completo', value: 'Ensino Médio Completo' },
                      { label: 'Ensino Médio Incompleto', value: 'Ensino Médio Incompleto' },
                      { label: 'Superior Completo', value: 'Superior Completo' },

                    selected={formData.grauInstrucao}

                  />

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 border border-slate-100 rounded-2xl p-6 mt-4 animate-fade-in">
                    <div className="md:col-span-2 border-b border-slate-200/50 pb-2 mb-2">
                      <h4 className="text-xs font-extrabold text-premier-blue uppercase tracking-wider">Cadastro de Dependentes</h4>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Dependente 01 (Nome)</label>
                      <input
                        type="text"
                        value={formData.dependente1Nome}
                        onChange={(e) => handleInputChange('dependente1Nome', e.target.value)}
                        placeholder="Nome do dependente 01"
                        className="w-full"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">CPF do Dependente 01</label>
                      <input
                        type="text"
                        value={formData.dependente1Cpf}
                        onChange={(e) => handleInputChange('dependente1Cpf', e.target.value, formatCPF)}
                        placeholder="000.000.000-00"
                        className="w-full"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Dependente 02 (Nome)</label>
                      <input
                        type="text"
                        value={formData.dependente2Nome}
                        onChange={(e) => handleInputChange('dependente2Nome', e.target.value)}
                        placeholder="Nome do dependente 02"
                        className="w-full"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">CPF do Dependente 02</label>
                      <input
                        type="text"
                        value={formData.dependente2Cpf}
                        onChange={(e) => handleInputChange('dependente2Cpf', e.target.value, formatCPF)}
                        placeholder="000.000.000-00"
                        className="w-full"
                      />
                    </div>
                  </div>
                )}
              </div>
            </div>
            )}

            {/* SECTION 7: DECLARAÇÃO FINAL */}
            <div className="space-y-6">
              <div className="flex items-center gap-3 border-b border-slate-100 pb-3">
                <div className="w-8 h-8 rounded-lg bg-premier-blue/10 flex items-center justify-center text-premier-blue font-bold text-sm">{hasHealthPlan && hasVT ? '07' : (!hasHealthPlan && !hasVT) ? '05' : '06'}</div>
                <h2 className="text-lg font-bold text-premier-blue">Declaração Final</h2>
              </div>

              <div className="space-y-4">
                <div className="bg-slate-50 border border-slate-200/60 rounded-2xl p-5 text-sm leading-relaxed text-slate-700 font-medium">
                  "Declaro que as informações acima são verdadeiras e autorizo os descontos em folha de pagamento conforme indicado nesta ficha, nos termos da legislação trabalhista vigente (CLT)."
                </div>

                <div className="flex items-start gap-3 px-2">
                  <input
                    id="declaracaoAceite"
                    type="checkbox"
                    checked={formData.declaracaoAceite}
                    onChange={(e) => handleInputChange('declaracaoAceite', e.target.checked)}
                    className="w-5 h-5 accent-premier-blue border-slate-300 rounded focus:ring-premier-blue mt-0.5 cursor-pointer"
                  />
                  <label htmlFor="declaracaoAceite" className="text-xs font-semibold text-slate-600 leading-normal cursor-pointer select-none">
                    Confirmo a veracidade das informações e autorizo os descontos pertinentes, de acordo com os termos descritos acima. *
                  </label>
                </div>

                <div className="mt-4 max-w-lg">
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Forma de Assinatura *</label>
                  <PillSelector
                    options={[
                      { label: 'Digitar Nome', value: 'texto' },
                      { label: 'Desenhar na Tela (Mouse ou Touch)', value: 'desenho' }
                    ]}
                    selected={formData.tipoAssinatura}
                    onChange={(val) => {
                      handleInputChange('tipoAssinatura', val);
                      setErrors(prev => {
                        const next = { ...prev };
                        delete next.assinaturaDigitada;
                        delete next.assinaturaDesenho;
                        return next;
                      });
                    }}
                  />
                </div>

                {formData.tipoAssinatura === 'texto' ? (
                  <div className="space-y-4 max-w-lg mt-4">
                    <div>
                      <label className={`block text-xs font-bold uppercase tracking-wider mb-1.5 ${errors.assinaturaDigitada ? 'text-red-600' : 'text-slate-500'
                        }`}>
                        Digite seu nome completo (para assinatura digital) *
                      </label>
                      <input
                        type="text"
                        value={formData.assinaturaDigitada}
                        onChange={(e) => {
                          handleInputChange('assinaturaDigitada', e.target.value);
                          if (errors.assinaturaDigitada && e.target.value.trim()) {
                            setErrors(prev => {
                              const next = { ...prev };
                              delete next.assinaturaDigitada;
                              return next;
                            });
                          }
                        }}
                        placeholder="Nome completo como consta no RG"
                        className={`w-full ${errors.assinaturaDigitada ? 'border-red-300 focus:border-red-500 focus:ring-red-200' : ''}`}
                      />
                      {errors.assinaturaDigitada && (
                        <span className="text-[10px] text-red-500 font-semibold mt-1.5 block">
                          {errors.assinaturaDigitada}
                        </span>
                      )}
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">
                        Visualização da Assinatura Digital Gerada
                      </label>
                      <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 text-center select-none shadow-inner h-28 flex items-center justify-center relative overflow-hidden transition-all duration-300">
                        {formData.assinaturaDigitada ? (
                          <span
                            style={{
                              fontFamily: "'EB Garamond', Garamond, Georgia, serif",
                              fontStyle: "italic",
                              fontWeight: "bold",
                              fontSize: '2.25rem',
                              color: '#211551',
                              textShadow: '0 1px 1px rgba(33,21,81,0.05)'
                            }}
                          >
                            {formData.assinaturaDigitada}
                          </span>
                        ) : (
                          <span className="text-xs text-slate-400 italic">
                            A assinatura estilizada aparecerá aqui conforme você digita seu nome.
                          </span>
                        )}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className={`border border-dashed rounded-2xl p-4 mt-4 max-w-lg transition-all ${errors.assinaturaDesenho ? 'border-red-500 bg-red-50/30 shadow-sm shadow-red-100' : 'border-slate-300/80 bg-slate-50/50'
                    }`}>
                    <label className={`block text-xs font-bold uppercase tracking-wider mb-2 ${errors.assinaturaDesenho ? 'text-red-600' : 'text-slate-500'
                      }`}>
                      Assinatura na Tela (Mouse ou Touch) *
                    </label>
                    <div className={`bg-white border rounded-xl overflow-hidden shadow-inner relative ${errors.assinaturaDesenho ? 'border-red-300' : 'border-slate-200'
                      }`}>
                      <canvas
                        ref={canvasRef}
                        width={480}
                        height={120}
                        className="w-full h-28 bg-white block cursor-crosshair touch-none"
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseLeave={stopDrawing}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                      />
                      <button
                        type="button"
                        onClick={clearCanvas}
                        className="absolute right-2 bottom-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200/80 text-slate-500 text-[10px] font-bold rounded-lg transition-colors border border-slate-200"
                      >
                        Limpar
                      </button>
                    </div>
                    {errors.assinaturaDesenho ? (
                      <span className="text-[10px] text-red-500 font-semibold mt-1.5 block leading-normal">
                        {errors.assinaturaDesenho}
                      </span>
                    ) : (
                      <span className="text-[10px] text-slate-400 mt-1.5 block leading-normal">
                        Assine desenhando com o mouse ou o dedo. A assinatura aparecerá na linha de assinatura do PDF.
                      </span>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* Submit Block */}
            <div className="border-t border-slate-100 pt-8 flex items-center justify-end">
              <button
                type="button"
                disabled={isGenerating}
                onClick={generatePDF}
                className={`flex items-center gap-2 px-8 py-4 bg-premier-blue text-white text-base font-bold rounded-2xl shadow-lg shadow-premier-blue/20 border border-premier-gold/30 hover:border-premier-gold transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-premier-blue/30 disabled:opacity-75 disabled:cursor-not-allowed ${isGenerating ? "animate-pulse" : ""
                  }`}
              >
                {isGenerating ? (
                  <>
                    <svg className="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Gerando PDF...
                  </>
                ) : (
                  <>
                    <svg className="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Gerar PDF Ficha de Admissão
                  </>
                )}
              </button>
            </div>

          </form>

          {/* VT Confirmation Modal */}
          {vtModal.isOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl shadow-2xl border border-slate-100 max-w-lg w-full overflow-hidden transform transition-all duration-300 scale-100 p-6 md:p-8 space-y-6">
                <div className="flex items-center gap-3 border-b border-slate-100 pb-4">
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${
                    vtModal.option === 'Sim' ? 'bg-blue-50 text-blue-600' : 'bg-amber-50 text-amber-600'
                  }`}>
                    {vtModal.option === 'Sim' ? (
                      <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                    ) : (
                      <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                      </svg>
                    )}
                  </div>
                  <div>
                    <h3 className="text-base font-extrabold text-premier-blue uppercase tracking-wider font-sans">
                      Confirmação de Opção de VT
                    </h3>
                    <p className="text-slate-400 text-xs mt-0.5">Por favor, leia atentamente as informações abaixo</p>
                  </div>
                </div>

                <div className="space-y-4 text-slate-600 text-sm leading-relaxed">
                  {vtModal.option === 'Sim' ? (
                    <>
                      <p className="font-semibold text-slate-800">Você optou por RECEBER o Vale Transporte.</p>
                      <p>
                        A empresa fornecerá o benefício correspondente ao seu deslocamento diário residência-trabalho-residência.
                      </p>
                      <p>
                        Conforme a legislação vigente, haverá o desconto regulamentar em sua folha de pagamento de até <strong>6% do seu salário base mensal</strong>.
                      </p>
                      <div className="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 text-xs text-blue-800 font-medium">
                        ⚠️ <strong>Importante:</strong> Esta decisão de adesão ao Vale Transporte constará no seu <strong>contrato de trabalho</strong>.
                      </div>
                    </>
                  ) : (
                    <>
                      <p className="font-semibold text-slate-800">Você optou por NÃO RECEBER o Vale Transporte.</p>
                      <p>
                        Ao declinar o benefício, você declara sob as penas da lei que utiliza meios próprios de locomoção ou que não necessita de transporte público para o trajeto residência-trabalho-residência.
                      </p>
                      <p>
                        Portanto, <strong>não haverá nenhum desconto de 6%</strong> em sua folha de pagamento referente a este benefício.
                      </p>
                    </>
                  )}
                </div>

                <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100/80 flex flex-col gap-2">
                  <p className="text-xs font-bold text-slate-700 font-sans">
                    Deseja prosseguir com a opção selecionada?
                  </p>
                  <p className="text-[11px] text-slate-500">
                    Ao confirmar, esta escolha será registrada e enviada ao RH para constar em seu contrato de admissão.
                  </p>
                </div>

                <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                  <button
                    type="button"
                    onClick={() => {
                      setFormData(prev => ({ ...prev, optanteVT: '' }));
                      setVtModal({ isOpen: false, option: '' });
                    }}
                    className="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-xl transition-all"
                  >
                    Não, quero alterar
                  </button>
                  <button
                    type="button"
                    onClick={() => setVtModal({ isOpen: false, option: '' })}
                    className="px-6 py-2.5 bg-premier-blue text-white text-xs font-bold rounded-xl shadow-md hover:bg-premier-blue-dark transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-premier-blue focus:ring-offset-1"
                  >
                    Sim, confirmar e prosseguir
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
